<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pipe Bending Calculator — field calculator for conduit bending. EMT, IMC, Rigid. Hand and mechanical benders." />
  <meta name="theme-color" content="#0b0d12" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Pipe Bend" />

  <!-- Google Fonts (app uses JetBrains Mono + Bebas Neue) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <!-- CSS — app first, KHub standard layers -->
  <link rel="stylesheet" href="css/dark-mode.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/main.css" />

  <title>Pipe Bending Calculator</title>
</head>
<body>

  <!-- KHub: Skip link (WCAG 2.2) -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- KHub: Update notice -->
  <div id="update-notice"
       class="update-notice"
       role="status"
       aria-live="polite"
       aria-atomic="true"
       hidden>
    Update available — <button class="btn btn-sm btn-secondary"
            onclick="KHub.SW.applyUpdate()">Refresh</button>
  </div>

  <!-- KHub: Error boundary -->
  <div id="error-boundary"
       class="error-boundary"
       role="alert"
       aria-live="assertive"
       aria-atomic="true"
       tabindex="-1"
       hidden>
    <strong>Something went wrong</strong>
    <p id="error-message"></p>
    <button class="btn btn-sm btn-danger"
            onclick="KHub.ErrorBoundary.dismiss()">Dismiss</button>
  </div>

  <!-- React root -->
  <main id="main-content" role="main" aria-label="Pipe Bending Calculator">
    <div id="root" aria-live="polite">
      <div class="loading">LOADING...</div>
    </div>
  </main>


  <!-- KHub: error handler + localStorage export stub -->
  <script>
  window.addEventListener('error',function(e){
    var eb=document.getElementById('error-boundary');
    var em=document.getElementById('error-message');
    if(eb&&em){em.textContent=e.message||'An error occurred.';eb.hidden=false;}
  });
  window.addEventListener('unhandledrejection',function(e){
    console.error('[PipeBend] Rejection:',e.reason);
  });
  // export/import: localStorage used only for saved calculations
  function exportCalcState(){
    var keys=['custom_benders','favorites','units','shrink'];
    var data={};
    keys.forEach(function(k){if(localStorage.getItem(k))data[k]=localStorage.getItem(k);});
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='pipebend-state.json';a.click();URL.revokeObjectURL(a.href);
  }
  </script>

  <!-- React + Babel CDN (required for this app) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- KHub infra (load before app so KHub.ErrorBoundary is available) -->
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/error-boundary.js"></script>
  <script src="js/a11y.js"></script>
  <script src="js/perf.js"></script>
  <script src="js/sw-register.js"></script>

  <!-- App (Babel-transpiled React) -->
  <script type="text/babel" data-type="module" src="js/app.js"></script>

</body>
</html>
