const fmtFracIn = (d) => {
  if (d === null || d === undefined || !isFinite(d)) return "--";
  if (Math.abs(d) < 1/32) return `0"`;
  const sign = d < 0 ? "-" : "";
  const abs = Math.abs(d);
  const whole = Math.floor(abs);
  let s = Math.round((abs - whole) * 16);
  let w = whole;
  if (s === 16) { w += 1; s = 0; }
  if (s === 0) return `${sign}${w}"`;
  let n = s, dd = 16;
  while (n % 2 === 0 && dd % 2 === 0) { n /= 2; dd /= 2; }
  return w === 0 ? `${sign}${n}/${dd}"` : `${sign}${w} ${n}/${dd}"`;

      {sublabel && <text x={x} y={y + 30} textAnchor="middle" fill="#a1a1aa" fontSize="9" fontFamily="JetBrains Mono">{sublabel}</text>}
      {symbol === "arrow" && <text x={x} y={y + 5} textAnchor="middle" fill={c} fontSize="14" fontWeight="700">▲</text>}
      {symbol === "star" && <text x={x} y={y + 5} textAnchor="middle" fill={c} fontSize="14" fontWeight="700">★</text>}
      {symbol === "notch" && <text x={x} y={y + 5} textAnchor="middle" fill={c} fontSize="14" fontWeight="700">◆</text>}
    </g>
  );
};

const GenericDiagram = ({ marks, units }) => {

function pvcSteps() {
  return ["Plug both ends with rags or caps.", "Wrap heat blanket, heat 60-180 seconds.", "Test pliability without wrinkling.", "Form against jig, set with wet rag."];
}

function factorySweepInfo(size, conduit, units) {
  const rData = FACTORY_SWEEP_RADIUS[size];
  if (!rData) return null;
  const r = rData.standard;
  const arc90 = (r * Math.PI) / 2;
  return {
    rows: [
      { label: "FIELD BENDING", value: "NOT STANDARD", highlight: true },
      { label: "Method", value: "Factory sweep elbow" },
      { label: "Standard radius", value: fmt(r, units) },
      { label: "Long-radius option", value: fmt(rData.large, units) },
      { label: "Arc length for 90", value: fmt(arc90, units), highlight: true },
    ],
    steps: [`${size}" uses factory sweep elbows.`, `Standard radius for ${size}" ${conduit}: ${fmt(r, units)} per NEC Table 2.`, "Order from supplier."],
    marks: [],
  };
}

function calculate(bendType, inputs, shoe, isPVC, angle, options, size, conduit) {
  if (isFactorySweepOnly(size) && !isPVC) return factorySweepInfo(size, conduit, options.units);
  if (!shoe && !isPVC) return { error: "Pick a valid combo." };
  const takeUp = shoe?.takeUp ?? 0, gain = shoe?.gain ?? 0;
  const a = ANGLES[angle];
  const shrinkOn = options.shrinkAutoCorrect;
  const cb = options.criticalBend || "second";

  switch (bendType) {
    case "stub": {
      const stub = num(inputs.stub);
      if (stub <= 0) return { error: "Enter stub height." };
      if (isPVC) return { rows: [{ label: "Stub", value: fmt(stub, options.units) }], steps: pvcSteps(), marks: [{ value: stub, sublabel: "start" }] };
      const mark = stub - takeUp;
      if (mark <= 0) return { error: `Stub less than take-up (${takeUp}").` };
      return {
        rows: [{ label: "Take-up", value: `${takeUp}"` }, { label: "Stub", value: fmt(stub, options.units) }, { label: "MARK from end", value: fmt(mark, options.units), highlight: true }],
        steps: [`Measure ${fmt(mark, options.units)} from end, mark.`, "Hook end toward you, ARROW on mark.", "Bend to 90."],
        marks: [{ value: mark, sublabel: "ARROW" }],
      };
    }
    case "back2back": {
      const stub = num(inputs.stub), b2b = num(inputs.b2b);
      if (stub <= 0 || b2b <= 0) return { error: "Enter stub and B2B." };
      const m1 = stub - takeUp, m2 = m1 + b2b;
      return {
        rows: [{ label: "Stub", value: fmt(stub, options.units) }, { label: "B2B", value: fmt(b2b, options.units) }, { label: "FIRST (ARROW)", value: fmt(m1, options.units), highlight: true }, { label: "SECOND (STAR)", value: fmt(m2, options.units), highlight: true }],
        steps: [`First ${fmt(m1, options.units)}, bend 90 ARROW.`, `Second ${fmt(m2, options.units)} from same end.`, "Flip pipe, STAR, bend 90."],
        marks: [{ value: m1, sublabel: "ARROW", symbol: "arrow" }, { value: m2, sublabel: "STAR", symbol: "star" }],
      };
    }
    case "reverse90": {
      const stub = num(inputs.stub);
      if (stub <= 0) return { error: "Enter stub height." };
      const star = stub, arrow = stub + (takeUp - gain);
      return {
        rows: [{ label: "Long-leg stub", value: fmt(stub, options.units) }, { label: "STAR mark", value: fmt(star, options.units), highlight: true }, { label: "ARROW mark", value: fmt(arrow, options.units), highlight: true }],
        steps: [`Method A: STAR on ${fmt(star, options.units)}, handle toward long end.`, `Method B: ARROW on ${fmt(arrow, options.units)}.`, "Stand on long side, bend to 90."],
        marks: [{ value: star, sublabel: "STAR", symbol: "star" }, { value: arrow, sublabel: "ARROW", symbol: "arrow" }],
      };
    }
    case "kicked90": {
      const stub = num(inputs.stub), kick = num(inputs.kick);
      if (stub <= 0 || kick <= 0 || !a) return { error: "Enter stub, kick, angle." };
      const mark = stub - takeUp, ks = kick * a.mult;
      return {
        rows: [{ label: "Stub", value: fmt(stub, options.units) }, { label: "Kick depth", value: fmt(kick, options.units) }, { label: "90 MARK", value: fmt(mark, options.units), highlight: true }, { label: "Kick spacing", value: fmt(ks, options.units), highlight: true }],
        steps: [`Bend 90: ARROW on ${fmt(mark, options.units)}.`, `Layout kick: 2 marks ${fmt(ks, options.units)} apart on vertical leg.`, `Bend each to ${angle}°, rotate 180 between.`],
        marks: [{ value: mark, sublabel: "90 ARROW" }],
      };
    }
    case "offset": {
      const offset = num(inputs.offset), d = num(inputs.distFromEnd);
      if (offset <= 0 || !a) return { error: "Enter offset and angle." };
      const sp = offset * a.mult, sh = offset * a.shrink;
      let m1 = null, m2 = null;
      if (d > 0) {
        if (cb === "second") { m2 = d - (shrinkOn ? sh : 0); m1 = m2 - sp; }
        else { m1 = d - (shrinkOn ? sh : 0); m2 = m1 + sp; }
      }
      return {
        rows: [
          { label: "Angle", value: `${angle}°` },
          { label: "Offset", value: fmt(offset, options.units) },
          { label: "MARK SPACING", value: fmt(sp, options.units), highlight: true },
          { label: "Shrink", value: fmt(sh, options.units) },
          { label: "Auto-correct", value: shrinkOn ? "ON" : "OFF" },
          ...(d > 0 ? [{ label: "M1 from end", value: fmt(m1, options.units), highlight: true }, { label: "M2 from end", value: fmt(m2, options.units), highlight: true }] : []),
        ],
        steps: isPVC ? pvcSteps() : [
          d > 0 ? `M1 ${fmt(m1, options.units)}, M2 ${fmt(m2, options.units)}.` : `Mark anywhere, then ${fmt(sp, options.units)} further.`,
          `M1 ARROW bend ${angle}°.`, "Slide to M2, ROTATE 180.", `M2 ARROW bend ${angle}°.`,
        ],
        marks: d > 0 ? [{ value: m1, sublabel: `${angle}°` }, { value: m2, sublabel: `${angle}° rot 180` }] : [],
      };
    }
    case "saddle3": {
      const obs = num(inputs.obstruction), d = num(inputs.distFromEnd);
      if (obs <= 0) return { error: "Enter obstruction height." };
      const side = obs * 2.5, sh = obs * (3/16);
      let c = null, f = null, sec = null;
      if (d > 0) { c = d - (shrinkOn ? sh : 0); f = c - side; sec = c + side; }
      return {
        rows: [
          { label: "Angles", value: "22.5/45/22.5" },
          { label: "Obstruction", value: fmt(obs, options.units) },
          { label: "CENTER to OUTER", value: fmt(side, options.units), highlight: true },
          { label: "Shrink", value: fmt(sh, options.units) },
          ...(c != null ? [{ label: "Center", value: fmt(c, options.units), highlight: true }, { label: "Outer 1", value: fmt(f, options.units), highlight: true }, { label: "Outer 2", value: fmt(sec, options.units), highlight: true }] : []),
        ],
        steps: isPVC ? pvcSteps() : [
          d > 0 ? `Center ${fmt(c, options.units)}, outers ${fmt(f, options.units)} & ${fmt(sec, options.units)}.` : `Mark center, outers ${fmt(side, options.units)} each side.`,
          "Center NOTCH, bend 45.", "First outer: ROTATE 180, ARROW, bend 22.5.", "Second outer: ARROW, bend 22.5.",
        ],
        marks: c != null ? [{ value: f, sublabel: "22.5°", symbol: "arrow" }, { value: c, sublabel: "45°", symbol: "notch" }, { value: sec, sublabel: "22.5°", symbol: "arrow" }] : [],
      };
    }
    case "saddle4": {
      const obs = num(inputs.obstruction), w = num(inputs.width), d = num(inputs.distFromEnd);
      if (obs <= 0 || w <= 0) return { error: "Enter obstruction H and W." };
      const ai = ANGLES[angle] || ANGLES[45];
      const os = obs * ai.mult, sh = obs * ai.shrink;
      let m1 = null, m2 = null, m3 = null, m4 = null;
      if (d > 0) { m1 = d - (shrinkOn ? sh : 0); m2 = m1 + os; m3 = m2 + w; m4 = m3 + os; }
      return {
        rows: [
          { label: "Angle", value: `${angle}°` },
          { label: "Obs", value: `${fmt(obs, options.units)} x ${fmt(w, options.units)}` },
          { label: "M1 to M2", value: fmt(os, options.units), highlight: true },
          { label: "M2 to M3", value: fmt(w, options.units), highlight: true },
          { label: "M3 to M4", value: fmt(os, options.units), highlight: true },
          ...(m1 != null ? [{ label: "M1", value: fmt(m1, options.units), highlight: true }, { label: "M2", value: fmt(m2, options.units), highlight: true }, { label: "M3", value: fmt(m3, options.units), highlight: true }, { label: "M4", value: fmt(m4, options.units), highlight: true }] : []),
        ],
        steps: ["Layout 4 marks.", `M1 ARROW ${angle}°.`, `M2 ROTATE 180, ${angle}°.`, `M3 (no rot) ${angle}°.`, `M4 ROTATE 180, ${angle}°.`],
        marks: m1 != null ? [{ value: m1, sublabel: `${angle}°` }, { value: m2, sublabel: `${angle}°` }, { value: m3, sublabel: `${angle}°` }, { value: m4, sublabel: `${angle}°` }] : [],
      };
    }
    case "rolling": {
      const rise = num(inputs.rise), roll = num(inputs.roll);
      if (rise <= 0 || roll <= 0 || !a) return { error: "Enter rise, roll, angle." };
      const t = Math.sqrt(rise*rise + roll*roll);
      const sp = t * a.mult;
      const ra = (Math.atan2(roll, rise) * 180) / Math.PI;
      return {
        rows: [
          { label: "Rise", value: fmt(rise, options.units) },
          { label: "Roll", value: fmt(roll, options.units) },
          { label: "TRUE offset", value: fmt(t, options.units), highlight: true },
          { label: "MARK SPACING", value: fmt(sp, options.units), highlight: true },
          { label: "ROLL angle", value: `${fmtDec(ra, 1)}°`, highlight: true },
        ],
        steps: [`Mark two points ${fmt(sp, options.units)} apart.`, "Reference line on side.", `M1 ARROW bend ${angle}°.`, `Slide, rotate ${fmtDec(ra, 1)}° (NOT 180).`, `M2 ARROW bend ${angle}°.`],
        marks: [],
      };
    }
    case "parallel": {
      const offset = num(inputs.offset), sc = num(inputs.spacing);
      if (offset <= 0 || sc <= 0 || !a) return { error: "Enter offset, spacing, angle." };
      const bs = offset * a.mult;
      const adder = sc / Math.tan((angle * Math.PI) / 180);
      return {
        rows: [
          { label: "Angle", value: `${angle}°` },
          { label: "Offset", value: fmt(offset, options.units) },
          { label: "C-to-C", value: fmt(sc, options.units) },
          { label: "Lead spacing", value: fmt(bs, options.units), highlight: true },
          { label: "ADDER per pipe", value: fmt(adder, options.units), highlight: true },
        ],
        steps: ["Bend lead pipe normally.", `Each next pipe: move FIRST mark forward by ${fmt(adder, options.units)}.`, `Mark spacing stays ${fmt(bs, options.units)}.`],
        marks: [],
      };
    }
    case "concentric": {
      const ir = num(inputs.innerRadius), sc = num(inputs.spacing), sw = num(inputs.sweep, 90);
      if (ir <= 0 || sc <= 0) return { error: "Enter inner R and spacing." };
      const sr = (sw * Math.PI) / 180;
      const rows = [];
      for (let n = 0; n < 4; n++) {
        const r = ir + n * sc;
        rows.push({ label: `Pipe ${n+1}`, value: `R ${fmt(r, options.units)} / arc ${fmt(r * sr, options.units)}`, highlight: n === 0 });
      }
      return {
        rows: [{ label: "Sweep", value: `${sw}°` }, { label: "Inner R", value: fmt(ir, options.units) }, { label: "Spacing", value: fmt(sc, options.units) }, ...rows],
        steps: ["Requires hydraulic bender with segment capability.", "Bend innermost first with small segments.", "Each outer: radius increases by spacing."],
        marks: [],
      };
    }
    case "segmented": {
      const tr = num(inputs.targetRadius), sw = num(inputs.sweep, 90), seg = Math.max(2, Math.round(num(inputs.segments, 6)));
      if (tr <= 0) return { error: "Enter target radius." };
      const dps = sw / seg;
      const sr = (sw * Math.PI) / 180;
      const tot = tr * sr;
      const chord = 2 * tr * Math.sin(((dps * Math.PI) / 180) / 2);
      return {
        rows: [
          { label: "Target R", value: fmt(tr, options.units) },
          { label: "Sweep", value: `${sw}°` },
          { label: "Segments", value: `${seg}` },
          { label: "DEGREES per bend", value: `${fmtDec(dps, 2)}°`, highlight: true },
          { label: "CHORD spacing", value: fmt(chord, options.units), highlight: true },
          { label: "Total arc", value: fmt(tot, options.units) },
        ],
        steps: [`Mark ${seg} points at ${fmt(chord, options.units)} intervals.`, `Bend ${fmtDec(dps, 2)}° at each, no rotation.`],
        marks: [],
      };
    }
    default: return { error: "Pick a bend type." };
  }
}

        </div>

        {!handBendable && !isPVC && !factorySweep && (
          <div className="card" style={{ padding: 16 }}>
            <span className="label"><span className="step-label">03</span>Bender</span>
            {largeBenders.length === 0 ? <div className="error">No bender available for this size. Add a custom one below.</div> : (
              <select className="input-field" value={largeBenderId} onChange={e => setLargeBenderId(e.target.value)}>
                <optgroup label="Greenlee">{largeBenders.filter(([id]) => id.startsWith("greenlee")).map(([id, b]) => <option key={id} value={id}>{b.label}</option>)}</optgroup>
                <optgroup label="Current Tools">{largeBenders.filter(([id]) => id.startsWith("current")).map(([id, b]) => <option key={id} value={id}>{b.label}</option>)}</optgroup>
                <optgroup label="Southwire">{largeBenders.filter(([id]) => id.startsWith("southwire")).map(([id, b]) => <option key={id} value={id}>{b.label}</option>)}</optgroup>
                <optgroup label="Ridgid">{largeBenders.filter(([id]) => id.startsWith("ridgid")).map(([id, b]) => <option key={id} value={id}>{b.label}</option>)}</optgroup>
                {largeBenders.filter(([id]) => id.startsWith("custom_")).length > 0 && <optgroup label="Custom">{largeBenders.filter(([id]) => id.startsWith("custom_")).map(([id, b]) => <option key={id} value={id}>{b.label}</option>)}</optgroup>}
              </select>
            )}
            <div style={{ marginTop: 10 }}><button className="toggle" onClick={() => setShowCustomForm(!showCustomForm)}>+ Custom Bender</button></div>
            {showCustomForm && (
              <div style={{ marginTop: 10, padding: 10, background: "#0a0a0a", border: "1px solid #27272a" }}>
                <div className="grid-2" style={{ marginBottom: 8 }}>
                  <input className="input-field" placeholder="Name" value={customForm.name} onChange={e => setCustomForm({ ...customForm, name: e.target.value })} style={{ fontSize: 13 }} />
                  <select className="input-field" value={customForm.conduit} onChange={e => setCustomForm({ ...customForm, conduit: e.target.value })} style={{ fontSize: 13 }}>
                    {["EMT", "RMC", "IMC"].map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <input className="input-field" placeholder="Size" value={customForm.size} onChange={e => setCustomForm({ ...customForm, size: e.target.value })} style={{ fontSize: 13 }} />
                  <input className="input-field" placeholder="Take-up" type="number" value={customForm.takeUp} onChange={e => setCustomForm({ ...customForm, takeUp: e.target.value })} style={{ fontSize: 13 }} />
                  <input className="input-field" placeholder="Gain" type="number" value={customForm.gain} onChange={e => setCustomForm({ ...customForm, gain: e.target.value })} style={{ fontSize: 13 }} />
                  <input className="input-field" placeholder="Radius (opt)" type="number" value={customForm.radius} onChange={e => setCustomForm({ ...customForm, radius: e.target.value })} style={{ fontSize: 13 }} />
                </div>
                <button className="seg-btn active" onClick={addCustom}>Save</button>
              </div>
            )}
            {Object.keys(customBenders).length > 0 && (
              <div style={{ marginTop: 10 }}>
                <span className="label">Your custom benders</span>
                {Object.entries(customBenders).map(([id, b]) => (
                  <div key={id} style={{ display: "flex", justifyContent: "space-between", padding: 6, background: "#0a0a0a", marginBottom: 4, fontSize: 11 }}>
                    <span>{b.label}</span>
                    <button onClick={() => deleteCustom(id)} style={{ background: "transparent", border: "none", color: "#71717a", cursor: "pointer" }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {shoe && !isPVC && !factorySweep && (
          <div className="card" style={{ padding: 12, fontSize: 12, color: "#a1a1aa" }}>
            <span style={{ color: "#fbbf24", fontWeight: 700 }}>SHOE: </span>
            Take-up {shoe.takeUp}" | Gain {shoe.gain}"{shoe.radius ? ` | R ${shoe.radius}"` : ""}
          </div>
        )}

        <div className="card" style={{ padding: 16 }}>
          <span className="label"><span className="step-label">{handBendable || isPVC || factorySweep ? "03" : "04"}</span>Bend Type</span>
          <div className="grid-3">
            {BEND_TYPES.map(b => (
              <button key={b.id} className={`bend-btn ${bendType === b.id ? "active" : ""}`} onClick={() => { setBendType(b.id); setInputs({}); }}>
                <BendIcon type={b.id} size={26} color={bendType === b.id ? "#09090b" : "#fbbf24"} />
                <span style={{ textAlign: "center" }}>{b.label}</span>
              </button>
            ))}
          </div>
        </div>

        {showAngle && !factorySweep && (
          <div className="card" style={{ padding: 16 }}>
            <span className="label">Angle</span>
            <div className="grid-5">
              {Object.keys(ANGLES).map(a => <button key={a} className={`angle-btn ${parseFloat(a) === angle ? "active" : ""}`} onClick={() => setAngle(parseFloat(a))}>{a}</button>)}
            </div>
          </div>
        )}

        {showCritical && !factorySweep && (
          <div className="card" style={{ padding: 16 }}>
            <span className="label">Critical Bend</span>
            <div className="flex gap-2">
              <button className={`seg-btn ${criticalBend === "first" ? "active" : ""}`} onClick={() => setCriticalBend("first")}>First</button>
              <button className={`seg-btn ${criticalBend === "second" ? "active" : ""}`} onClick={() => setCriticalBend("second")}>Second</button>
            </div>
          </div>
        )}

        {!factorySweep && (
          <div className="card" style={{ padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="label" style={{ marginBottom: 0 }}>Measurements</span>
              <button className="toggle" onClick={reset}>Clear</button>
            </div>
            <div>
              {fields.map(f => (
                <div key={f.key} style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: "#a1a1aa", display: "block", marginBottom: 4 }}>{f.label} <span style={{ color: "#52525b" }}>({units === "metric" ? "mm" : "in"})</span></label>
                  <input type="number" step="0.0625" inputMode="decimal" className="input-field" value={inputs[f.key] || ""} onChange={e => setInput(f.key, e.target.value)} placeholder="0" />
                </div>
              ))}
            </div>
          </div>
        )}

        <div className="card">
          <div style={{ padding: "12px 16px", borderBottom: "1px solid #27272a", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <span className="display" style={{ fontSize: 22, color: "#fbbf24" }}>RESULTS</span>
            <div style={{ display: "flex", gap: 6 }}>
              <span className="pill">{BEND_TYPES.find(b => b.id === bendType)?.label}</span>
              {shrinkAutoCorrect && !factorySweep && <span className="pill" style={{ background: "#422006" }}>Shrink ON</span>}
            </div>
          </div>

          <div style={{ background: "#0a0a0a", borderBottom: "1px solid #27272a", padding: 14, display: "flex", gap: 14, alignItems: "center" }}>
            <div style={{ flex: "0 0 auto", background: "#0f0f10", border: "1px solid #27272a", borderRadius: 4, padding: 8, width: 90, height: 70, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <BendIcon type={bendType} size={44} color="#fbbf24" />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="display" style={{ fontSize: 18, color: "#fbbf24", marginBottom: 4 }}>{BEND_TYPES.find(b => b.id === bendType)?.label.toUpperCase()}</div>
              <div style={{ fontSize: 11, color: "#d4d4d8", marginBottom: 4 }}>{BEND_TYPES.find(b => b.id === bendType)?.desc}</div>
              <div style={{ fontSize: 10, color: "#a1a1aa" }}><span style={{ color: "#fbbf24", fontWeight: 700 }}>USE WHEN: </span>{BEND_TYPES.find(b => b.id === bendType)?.useWhen}</div>
            </div>
          </div>

          {result.error ? (
            <div style={{ padding: 16 }}><div className="error">{result.error}</div></div>
          ) : (
            <>
              {result.marks && result.marks.length > 0 && (
                <div style={{ background: "#050505", padding: 10, borderBottom: "1px solid #27272a" }}>
                  <GenericDiagram marks={result.marks} units={units} />
                </div>
              )}
              <div>
                {result.rows?.map((r, i) => (
                  <div key={i} className={`row ${r.highlight ? "row-highlight" : ""}`}>
                    <div style={{ flex: 1 }}><div className="row-label">{r.label}</div></div>
                    <div className="row-value">{r.value}</div>
                  </div>
                ))}
              </div>
              {result.steps && result.steps.length > 0 && (
                <div style={{ padding: 16, borderTop: "1px solid #27272a" }}>
                  <div className="label" style={{ marginBottom: 10 }}>Procedure</div>
                  <div className="step-list">{result.steps.map((s, i) => <div key={i} className="step">{s}</div>)}</div>
                </div>
              )}
            </>
          )}
        </div>

        <div className="card" style={{ padding: 16 }}>
          <div className="label" style={{ marginBottom: 8 }}>Quick Reference</div>
          <div style={{ fontSize: 12, color: "#a1a1aa", lineHeight: 1.6 }}>
            <div>10° : mult 6.0 : shrink 1/16 per in</div>
            <div>22.5° : mult 2.6 : shrink 3/16 per in</div>
            <div>30° : mult 2.0 : shrink 1/4 per in</div>
            <div>45° : mult 1.4 : shrink 3/8 per in</div>
            <div>60° : mult 1.2 : shrink 1/2 per in</div>
          </div>
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #27272a", fontSize: 11, color: "#71717a", lineHeight: 1.5 }}>
            NEC 358.26 / 344.26 / 352.26: max 360° between pull points. Sizes 5" and 6" use factory sweep elbows.
          </div>
        </div>

        <div className="stripe" style={{ marginTop: 16 }}></div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PipeBendingCalculator />);
</script>
</body>
</html>
